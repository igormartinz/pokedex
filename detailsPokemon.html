<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/datailsPokemon.css">
    <title>Pokédex</title>
</head>

<body>
    <!-- BOTÃO DE SOM -->
    <button id="sound">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#FFF">
            <path
                d="M560-131v-82q90-26 145-100t55-168q0-94-55-168T560-749v-82q124 28 202 125.5T840-481q0 127-78 224.5T560-131ZM120-360v-240h160l200-200v640L280-360H120Zm440 40v-322q47 22 73.5 66t26.5 96q0 51-26.5 94.5T560-320ZM400-606l-86 86H200v80h114l86 86v-252ZM300-480Z" />
        </svg>
    </button>

    <!-- CONTEUDO -->
    <main>
        <section>
            <div class="div-content">

                <!-- PERFIL DO POKÉMON -->
                <div class="profile-pokemon">
                    <h1 id="name-pokemon"></h1>
                    <p id="id-pokemon"></p>
                    <img src="" alt="Pokémon" id="img-pokemon">
                </div>

                <!-- INFORMAÇÕES DO POKÉMON -->
                <div>
                    <div class="info-pokemon">
                        <div>
                            <h2>Altura</h2>
                            <p id="height-pokemon"></p>
                        </div>
                        <div>
                            <h2>Peso</h2>
                            <p id="weight-pokemon"></p>
                        </div>
                        <div>
                            <h2>Tipo</h2>
                            <div id="types-pokemon"></div>
                        </div>
                    </div>

                    <!-- EVOLUÇÕES DO POKÉMON -->
                    <div class="evolution">
                        <h2>Evolução</h2>
                        <div class="evolution-img" id="evolutions-pokemon">
                            
                        </div>
                    </div>
                </div>
            </div>

            <!-- ESTATÍSICAS DO POKÉMON -->
            <div class="stats">
                <h2>Estatísticas</h2>

                <div class="list-ability">
                    <div class="ability">
                        <div>
                            <h3>Pontos de Vida</h3>
                            <p id="hp-pokemon"></p>
                        </div>
                        <div class="progress-bar">
                            <div id="hp-pokemon-bar"></div>
                        </div>
                    </div>
                    <div class="ability">
                        <div>
                            <h3>Ataque</h3>
                            <p id="attack-pokemon"></p>
                        </div>
                        <div class="progress-bar">
                            <div id="attack-pokemon-bar"></div>
                        </div>
                    </div>
                    <div class="ability">
                        <div>
                            <h3>Defesa</h3>
                            <p id="defense-pokemon"></p>
                        </div>
                        <div class="progress-bar">
                            <div id="defense-pokemon-bar"></div>
                        </div>
                    </div>
                    <div class="ability">
                        <div>
                            <h3>Ataque Especial</h3>
                            <p id="special-attack-pokemon"></p>
                        </div>
                        <div class="progress-bar">
                            <div id="special-attack-pokemon-bar"></div>
                        </div>
                    </div>
                    <div class="ability">
                        <div>
                            <h3>Defesa Especial</h3>
                            <p id="special-defense-pokemon"></p>
                        </div>
                        <div class="progress-bar">
                            <div id="special-defense-pokemon-bar"></div>
                        </div>
                    </div>
                    <div class="ability">
                        <div>
                            <h3>Velocidade</h3>
                            <p id="speed-pokemon"></p>
                        </div>
                        <div class="progress-bar">
                            <div id="speed-pokemon-bar"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="power">
                <h2 class="total-power">Poder Total: <span id="power-pokemon"></span></h2>
                <button id="btn-back" class="btn-back">Voltar</button>
            </div>

        </section>
    </main>

    <script src="js/detailsPokemon.js"></script>
</body>

</html>
