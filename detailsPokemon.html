<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/datailsPokemon.css">
    <title>Pokédex</title>
</head>

<body>
    <button id="sound">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#FFF">
            <path
                d="M560-131v-82q90-26 145-100t55-168q0-94-55-168T560-749v-82q124 28 202 125.5T840-481q0 127-78 224.5T560-131ZM120-360v-240h160l200-200v640L280-360H120Zm440 40v-322q47 22 73.5 66t26.5 96q0 51-26.5 94.5T560-320ZM400-606l-86 86H200v80h114l86 86v-252ZM300-480Z" />
        </svg>
    </button>
    <main>
        <section>
            <div class="div-content">
                <div class="profile-pokemon">
                    <h1><span id="name-pokemon">PIKACHU</span></h1>
                    <p><span id="id-pokemon"># 25</span></p>
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/25.gif"
                        alt="" id="img-pokemon">
                </div>

                <div>
                    <div class="info-pokemon">
                        <div>
                            <h2>Altura</h2>
                            <p><span>40 CM</span></p>
                        </div>
                        <div>
                            <h2>Peso</h2>
                            <p><span>40 CM</span></p>
                        </div>
                        <div>
                            <h2>Tipo</h2>
                            <p><span>Elétrico</span></p>
                        </div>
                    </div>

                    <div class="evolution">
                        <h2>Evolução</h2>
                        <div class="evolution-img">
                            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/172.gif"
                                alt="">
                            <p>>
                            <p>
                                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/25.gif"
                                    alt="">
                            <p>>
                            <p>
                                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/26.gif"
                                    alt="">
                        </div>
                    </div>
                </div>
            </div>

            <div class="stats">
                <h2>Estatísticas</h2>

                <div class="list-ability">
                    <div class="ability">
                        <div>
                            <h3>Pontos de Vida</h3>
                            <p><span>35</span></p>
                        </div>
                        <div class="progress-bar">
                            <div id="hp-pokemon"></div>
                        </div>
                    </div>
                    <div class="ability">
                        <div>
                            <h3>Ataque</h3>
                            <p><span>55</span></p>
                        </div>
                        <div class="progress-bar">
                            <div id="attack-pokemon"></div>
                        </div>
                    </div>
                    <div class="ability">
                        <div>
                            <h3>Defesa</h3>
                            <p><span>40</span></p>
                        </div>
                        <div class="progress-bar">
                            <div id="defense-pokemon"></div>
                        </div>
                    </div>
                    <div class="ability">
                        <div>
                            <h3>Ataque Especial</h3>
                            <p><span>50</span></p>
                        </div>
                        <div class="progress-bar">
                            <div id="special-attack-pokemon"></div>
                        </div>
                    </div>
                    <div class="ability">
                        <div>
                            <h3>Defesa Especial</h3>
                            <p><span>50</span></p>
                        </div>
                        <div class="progress-bar">
                            <div id="special-defense-pokemon"></div>
                        </div>
                    </div>
                    <div class="ability">
                        <div>
                            <h3>Velocidade</h3>
                            <p><span>90</span></p>
                        </div>
                        <div class="progress-bar">
                            <div id="speed-pokemon"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="power">
                <h2 class="total-power">Poder Total: <span>320</span></h2>
                <a href="index.html" class="btn-back">Voltar</a>
            </div>

        </section>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
