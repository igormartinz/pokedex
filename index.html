<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/index.css">
    <title>Pokédex</title>
</head>

<body>
    <main>
        <!-- BOTÃO DE SOM -->
        <button id="sound">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#FFF">
                <path
                    d="M560-131v-82q90-26 145-100t55-168q0-94-55-168T560-749v-82q124 28 202 125.5T840-481q0 127-78 224.5T560-131ZM120-360v-240h160l200-200v640L280-360H120Zm440 40v-322q47 22 73.5 66t26.5 96q0 51-26.5 94.5T560-320ZM400-606l-86 86H200v80h114l86 86v-252ZM300-480Z" />
            </svg>
        </button>

        <!-- CONTEUDO -->
        <section id="content">

            <!-- TELA -->
            <div id="display">
                <div>
                    <span id="id-pokemon"></span>
                    <img src="" alt="Pokémon" id="img-pokemon">
                    <h1 id="name-pokemon"></h1>
                </div>
            </div>

            <!-- BOLA  -->
            <div id="circle-pokeball"></div>


            <!-- INPUT E BOTÕES -->
            <div id="form">
                <form>
                    <input type="search" id="input-search" placeholder="Busque pelo Nome ou ID...">

                    <div id="buttons">
                        <div class="buttons-movement">
                            <button id="btn-prev">
                                <img src="/svg/seta-esquerda.svg" alt="">
                            </button>
                            <button id="btn-next">
                                <img src="/svg/seta-direita.svg" alt="">
                            </button>
                        </div>

                        <div class="buttons-action">
                            <div class="div-details">
                                <a href="detailsPokemon.html" class="btn-details">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#1f1f1f">
                                        <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z" />
                                    </svg>
                                </a>
                                <p>Detalhes</p>
                            </div>
                            <div class="div-search">
                                <button id="btn-submit" type="submit">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#1f1f1f">
                                        <path
                                            d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z" />
                                    </svg>
                                </button>
                                <p>Buscar</p>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
