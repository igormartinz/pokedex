<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/index.css">
    <title>Pokédex</title>
</head>

<body>
    <main>
        <!-- CONTEUDO -->
        <section id="content">

            <!-- TELA -->
            <div id="display">
                <div id="content-display">
                    <span id="id-pokemon"></span>
                    <div id="content-img-pokemon">
                        <img src="" alt="Pokémon" id="img-pokemon" class="img">
                    </div>
                    <h1 id="name-pokemon"></h1>
                </div>
            </div>

            <!-- BOLA  -->
            <div id="circle-pokeball"></div>


            <!-- INPUT E BOTÕES -->
            <div id="content-buttons">
                <form id="form">
                    <input type="search" id="input-search" placeholder="Busque pelo Nome ou ID..." required>

                    <div id="buttons">
                        <div class="buttons-movement">
                            <button id="btn-prev" type="button" aria-label="Pokémon anterior">
                                <img src="/svg/seta-esquerda.svg" alt="Seta para esquerda">
                            </button>
                            <button id="btn-next" type="button" aria-label="Próximo Pokémon">
                                <img src="/svg/seta-direita.svg" alt="Seta para direita">
                            </button>
                        </div>
                        <div class="buttons-action">
                            <div class="div-details">
                                <button type="button" class="btn-details" id="btn-details" aria-label="Ver detalhes do Pokémon">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#1f1f1f">
                                        <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z" />
                                    </svg>
                                </button>
                                <span>Detalhes</span>
                            </div>
                            <div class="div-search">
                                <button id="btn-submit" type="submit" aria-label="Buscar Pokémon">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" fill="#1f1f1f">
                                        <path
                                            d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z" />
                                    </svg>
                                </button>
                                <span>Buscar</span>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="js/index.js"></script>
</body>

</html>
